services:
  postgres-db:
    image: postgres:18.3
    container_name: clearbook_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      PGDATA: /var/lib/postgresql/data/pgdata # <--- KLUCZOWE DLA V18+
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data # Dane nie znikną po restarcie kontenera

volumes:
  postgres-data:
