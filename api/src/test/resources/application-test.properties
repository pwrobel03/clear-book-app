# ── Integration test configuration ────────────────────────────────────────────
# Datasource URL/username/password are overridden at runtime by @DynamicPropertySource
# in AbstractIntegrationTest. The values below just prevent startup failures when
# the .env file is absent from the developer's machine.
DB_NAME=test
DB_USER=test
DB_PASSWORD=test

# JWT: Base64-encoded key for HMAC-SHA-256 (must decode to >= 32 bytes).
# "clearbook-integration-test-secret-key-do-not-use-in-production" → 63 bytes ✓
jwt.secret=Y2xlYXJib29rLWludGVncmF0aW9uLXRlc3Qtc2VjcmV0LWtleS1kby1ub3QtdXNlLWluLXByb2R1Y3Rpb24=

# Mail — JavaMailSender is @MockBean in AbstractIntegrationTest, so these values
# are never actually used, but must exist to satisfy Spring's auto-configuration.
EMAIL_USERNAME=test@example.com
EMAIL_2FA_PASSWORD=not-a-real-password

# Flyway is disabled in tests — Hibernate recreates the schema from JPA entities.
# This keeps test startup fast and avoids a conflict between Flyway migrations
# and Hibernate's create-drop lifecycle on the Testcontainers PostgreSQL instance.
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Silence the seed CommandLineRunner output during tests
logging.level.com.clearbook=WARN
