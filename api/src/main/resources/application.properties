spring.config.import=optional:file:.env[.properties]
spring.application.name=api

server.port=8080

# Wstrzykiwanie zmiennych ?rodowiskowych z pliku .env
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Konfiguracja Hibernate
#spring.jpa.hibernate.ddl-auto=update
# create-drop usuwa całą bazę przy każdym restarcie — tylko do jednorazowego testowania schematu
# spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Konfiguracja JWT
jwt.secret=${JWT_SECRET}
# Access token: 15 minut (900 000 ms). Można nadpisać zmienną środowiskową JWT_ACCESS_EXPIRATION_MS.
jwt.access-token.expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
# Refresh token: czas życia w dniach (domyślnie 7).
jwt.refresh-token.expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# Optymalizacja N+1 dla kolekcji LAZY - pobieranie powi?zanych encji w paczkach po 100
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# Konfiguracja wysy?ki E-mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_2FA_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Wy??czamy automatyczne generowanie schematu
spring.jpa.hibernate.ddl-auto=update

# Konfiguracja Flyway
spring.flyway.enabled=false
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Adres frontendu (domy?lnie localhost, mo?na nadpisa? zmienn? FRONTEND_URL w pliku .env)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}