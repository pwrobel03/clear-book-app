spring.application.name=api

server.port=8080

# Wstrzykiwanie zmiennych ?rodowiskowych z pliku .env
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Konfiguracja Hibernate
spring.jpa.hibernate.ddl-auto=update
# create-drop usuwa całą bazę przy każdym restarcie — tylko do jednorazowego testowania schematu
# spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Konfiguracja JWT
jwt.secret=${JWT_SECRET}

# Konfiguracja wysy?ki E-mail (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_2FA_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Adres frontendu (domy?lnie localhost, mo?na nadpisa? zmienn? FRONTEND_URL w pliku .env)
app.frontend.url=${FRONTEND_URL:http://localhost:3000}