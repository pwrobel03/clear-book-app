spring.config.import=optional:file:.env[.properties]
spring.application.name=api

server.port=8080

# ── Datasource ────────────────────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# ── Hibernate ─────────────────────────────────────────────────────────────────
# Flyway owns the schema; Hibernate only validates it matches the entities.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Batch-fetch to prevent N+1 queries on LAZY collections
spring.jpa.properties.hibernate.default_batch_fetch_size=100

# ── Flyway ────────────────────────────────────────────────────────────────────
# Flyway applies versioned migrations in order (V1 → V2 → V3 → V4 → …).
# baseline-on-migrate=true allows Flyway to run on databases that were
# created before Flyway was enabled (e.g. existing dev/staging environments).
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.locations=classpath:db/migration

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET}
jwt.access-token.expiration-ms=${JWT_ACCESS_EXPIRATION_MS:900000}
jwt.refresh-token.expiration-days=${JWT_REFRESH_EXPIRATION_DAYS:7}

# ── E-mail (Gmail SMTP) ───────────────────────────────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${EMAIL_USERNAME}
spring.mail.password=${EMAIL_2FA_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ── Frontend URL (CORS / links in e-mails) ────────────────────────────────────
app.frontend.url=${FRONTEND_URL:http://localhost:3000}
